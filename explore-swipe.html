<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>HeriLand Explore</title>

<style>

:root{
  --bg:#07110d;
  --green:#9ff2b1;
  --line:rgba(255,255,255,.16);
  --text:#f5f5f0;
  --muted:rgba(255,255,255,.65);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:
    -apple-system,
    BlinkMacSystemFont,
    "SF Pro Display",
    sans-serif;

  background:
    radial-gradient(circle at top right,
      rgba(159,242,177,.15),
      transparent 30%),

    radial-gradient(circle at bottom left,
      rgba(255,170,90,.08),
      transparent 28%),

    var(--bg);

  color:var(--text);

  min-height:100vh;

  overflow:hidden;
}

.app{
  width:100%;
  max-width:430px;
  height:100vh;

  margin:0 auto;

  padding:
    28px
    18px
    40px;

  position:relative;
}

/* =========================
   Top
========================= */

.top{
  position:relative;

  margin-bottom:28px;
}

.brand{
  text-align:left;
}

.brand h1{
  font-family:Georgia, serif;

  font-size:38px;
  font-weight:500;

  letter-spacing:-1px;
}

.brand p{
  margin-top:4px;

  font-size:11px;

  letter-spacing:4px;

  color:var(--green);

  font-weight:700;
}

.city{
  position:absolute;

  left:50%;
  top:0;

  transform:translateX(-50%);

  height:50px;

  padding:0 22px;

  border-radius:999px;

  background:
    rgba(255,255,255,.07);

  border:1px solid var(--line);

  backdrop-filter:blur(20px);

  display:flex;
  align-items:center;
  gap:8px;

  font-size:17px;
  font-weight:700;

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.1);
}

/* =========================
   Hint
========================= */

.hint{
  text-align:center;

  color:var(--muted);

  font-size:15px;

  margin-bottom:22px;

  letter-spacing:.2px;
}

/* =========================
   Card Stage
========================= */

.stage{
  position:relative;

  height:
    calc(100vh - 180px);
}

/* =========================
   Card
========================= */

.card{
  position:absolute;

  inset:0;

  border-radius:36px;

  overflow:hidden;

  border:
    1px solid rgba(255,255,255,.18);

  background:#111;

  box-shadow:
    0 40px 100px rgba(0,0,0,.6);

  transition:
    transform .4s ease,
    opacity .4s ease;
}

/* hidden second card */

.card.second{
  transform:
    translateX(26px)
    scale(.96);

  opacity:.78;

  z-index:1;
}

.card.third{
  transform:
    translateX(52px)
    scale(.92);

  opacity:.4;

  z-index:0;
}

.card.active{
  z-index:3;
}

/* =========================
   Image
========================= */

.card img{
  width:100%;
  height:100%;

  object-fit:cover;

  display:block;

  filter:
    contrast(1.05)
    saturate(.92);
}

/* =========================
   Overlay
========================= */

.overlay{
  position:absolute;
  inset:0;

  background:
    linear-gradient(
      to bottom,
      rgba(0,0,0,.38),
      transparent 28%
    ),

    linear-gradient(
      to top,
      rgba(0,0,0,.82),
      transparent 58%
    );
}

/* =========================
   Top Row
========================= */

.card-top{
  position:absolute;

  left:22px;
  right:22px;
  top:22px;

  display:flex;
  align-items:center;
  justify-content:space-between;

  z-index:3;
}

.pill{
  height:38px;

  padding:0 14px;

  border-radius:999px;

  background:
    rgba(0,0,0,.28);

  border:
    1px solid rgba(255,255,255,.18);

  backdrop-filter:blur(12px);

  display:flex;
  align-items:center;

  font-size:13px;
  font-weight:700;

  letter-spacing:.4px;
}

.index{
  font-size:15px;

  font-weight:700;
}

/* =========================
   Copy
========================= */

.copy{
  position:absolute;

  left:28px;
  right:28px;
  bottom:150px;

  z-index:3;
}

.copy h2{
  font-family:Georgia, serif;

  font-size:52px;

  line-height:.95;

  letter-spacing:-2px;

  font-weight:500;

  max-width:270px;

  margin-bottom:22px;
}

.line{
  width:42px;
  height:1px;

  background:
    rgba(255,255,255,.7);

  margin-bottom:20px;
}

.copy p{
  max-width:280px;

  font-size:16px;

  line-height:1.7;

  color:
    rgba(255,255,255,.88);
}

/* =========================
   Bottom
========================= */

.bottom{
  position:absolute;

  left:26px;
  right:26px;
  bottom:30px;

  display:flex;
  align-items:flex-end;
  justify-content:space-between;

  z-index:3;
}

.place h3{
  font-size:24px;

  margin-bottom:8px;
}

.tags{
  font-size:14px;

  color:var(--green);

  line-height:1.5;
}

.save{
  width:60px;
  height:60px;

  border-radius:50%;

  background:
    rgba(255,255,255,.08);

  border:
    1px solid rgba(255,255,255,.18);

  backdrop-filter:blur(16px);

  display:grid;
  place-items:center;

  font-size:24px;
}

/* =========================
   Swipe Hint
========================= */

.swipe{
  position:absolute;

  left:0;
  right:0;
  bottom:0;

  text-align:center;

  color:var(--muted);

  font-size:14px;

  line-height:1.7;

  letter-spacing:.3px;
}

/* =========================
   Mobile
========================= */

@media(max-height:760px){

  .copy{
    bottom:130px;
  }

  .copy h2{
    font-size:44px;
  }

}

</style>
</head>

<body>

<div class="app">

  <!-- top -->
  <section class="top">

    <div class="brand">
      <h1>HeriLand</h1>
      <p>DISCOVER SARAWAK</p>
    </div>

    <div class="city">
      Kuching
      <span>⌄</span>
    </div>

  </section>

  <!-- hint -->
  <div class="hint">
    Swipe to explore
  </div>

  <!-- stage -->
  <section class="stage">

    <!-- active -->
    <article class="card active">

      <img
        src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1200&q=80"
      />

      <div class="overlay"></div>

      <div class="card-top">

        <div class="pill">
          📍 KUCHING
        </div>

        <div class="index">
          1/25
        </div>

      </div>

      <div class="copy">

        <h2>
          Evenings hit different here.
        </h2>

        <div class="line"></div>

        <p>
          Locals come here to slow down.
          River breeze, city lights,
          and food after sunset.
        </p>

      </div>

      <div class="bottom">

        <div class="place">

          <h3>
            Kuching Waterfront
          </h3>

          <div class="tags">
            Riverside · Sunset · Local Life
          </div>

        </div>

        <div class="save">
          ♡
        </div>

      </div>

    </article>

    <!-- second -->
    <article class="card second">

      <img
        src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=1200&q=80"
      />

      <div class="overlay"></div>

    </article>

    <!-- third -->
    <article class="card third">

      <img
        src="https://images.unsplash.com/photo-1555396273-367ea4eb4db5?auto=format&fit=crop&w=1200&q=80"
      />

      <div class="overlay"></div>

    </article>

  </section>

  <!-- swipe -->
  <div class="swipe">
    ↑<br/>
    Swipe up for next
  </div>

</div>

</body>
</html>

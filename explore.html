<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>HeriLand Explore</title>

  <link
    rel="stylesheet"
    href="./css/pages/explore.css"
  />
</head>

<body>

  <main class="app">

    <!-- Top -->
    <header class="top">
    
      <div class="brand">
        <h1>HeriLand</h1>
        <span>DISCOVER SARAWAK</span>
      </div>
    
      <button class="city" id="filterToggle" type="button">
        <span id="currentFilterLabel">Kuching</span>
        <span>⌄</span>
      </button>
    
      <div class="filter-panel" id="filterPanel">
        <div class="filter-section">
          <p>Explore in</p>
    
          <div class="filter-grid">
            <button type="button" data-filter="kuching">Kuching</button>
            <button type="button" data-filter="sibu">Sibu</button>
            <button type="button" data-filter="miri">Miri</button>
            <button type="button" data-filter="bintulu">Bintulu</button>
          </div>
        </div>
    
        <div class="filter-section">
          <p>Mood</p>
    
          <div class="filter-grid">
            <button type="button" data-filter="nature">Nature</button>
            <button type="button" data-filter="food">Food</button>
            <button type="button" data-filter="culture">Culture</button>
            <button type="button" data-filter="night">Night</button>
            <button type="button" data-filter="hidden">Hidden</button>
            <button type="button" data-filter="local">Local</button>
          </div>
        </div>
      </div>
    
    </header>

    <!-- Hint -->
    <div class="hint">

      Swipe to explore

      <div class="glow-dot"></div>

    </div>

    <!-- Cards Stage -->
    <section
      class="stage"
      id="exploreStage"
    >

      <!-- JS Render -->

      <!-- Desktop Arrows -->
      <button
        class="nav-arrow nav-prev"
        type="button"
        aria-label="Previous"
      >
        ‹
      </button>

      <button
        class="nav-arrow nav-next"
        type="button"
        aria-label="Next"
      >
        ›
      </button>

    </section>

    <!-- Swipe Hint -->
    <div class="swipe">
      <div class="arrow">‹</div>
      Swipe left to explore
    </div>

  </main>

  <div id="detailContainer"></div>

  <script src="./js/explore.js"></script>

</body>

</html>

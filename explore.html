<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>HeriLand Explore</title>

  <link
    rel="stylesheet"
    href="./css/pages/explore.css"
  />
</head>

<body>

  <main class="app">

    <!-- Top -->
    <header class="top">

      <div class="brand">
        <h1>HeriLand</h1>
        <span>DISCOVER SARAWAK</span>
      </div>

      <div class="city">
        Kuching
        <span>⌄</span>
      </div>

    </header>

    <!-- Hint -->
    <div class="hint">

      Swipe to explore

      <div class="glow-dot"></div>

    </div>

    <!-- Cards Stage -->
    <section
      class="stage"
      id="exploreStage"
    >

      <!-- JS Render -->

      <!-- Desktop Arrows -->
      <button
        class="nav-arrow nav-prev"
        type="button"
        aria-label="Previous"
      >
        ‹
      </button>

      <button
        class="nav-arrow nav-next"
        type="button"
        aria-label="Next"
      >
        ›
      </button>

    </section>

    <!-- Swipe Hint -->
    <div class="swipe">

      <div class="arrow">
        ⌃
      </div>

      Swipe up for next

    </div>

  </main>

  <script src="./js/explore.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0" />

  <title>HeriLand Emergency</title>

  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/mobile.css" />
  <link rel="stylesheet" href="./css/pages/emergency.css" />
  <link rel="stylesheet" href="./css/mobile/emergency-mobile.css" />
</head>

<body>

<main class="page-container emergency-page">

  <!-- Mobile Top -->
  <header class="mobile-top">

    <div>
      <small>Your Location</small>
      <strong>Kuching, Sarawak</strong>
    </div>

    <button
      class="icon-btn"
      id="mobileMenuBtn"
      aria-label="menu"
    >
      <svg viewBox="0 0 24 24">
        <path d="M4 7h16"></path>
        <path d="M4 12h16"></path>
        <path d="M4 17h16"></path>
      </svg>
    </button>

  </header>

  <!-- Desktop Nav -->
  <div id="navbar"></div>

  <!-- Hero -->
  <section class="emergency-hero">

    <small>Emergency Support</small>

    <h1>
      緊急聯絡資訊
    </h1>

    <p>
      如果旅途中遇到突發狀況，
      可以快速找到當地官方單位電話。
    </p>

  </section>

  <!-- Filters -->
  <section class="emergency-filter">

    <div class="emergency-select-wrap">

      <label>
        城市
      </label>

      <select id="citySelect">

        <option value="all">
          全部城市
        </option>

        <option value="kuching">
          Kuching
        </option>

        <option value="sibu">
          Sibu
        </option>

        <option value="miri">
          Miri
        </option>

        <option value="bintulu">
          Bintulu
        </option>

      </select>

    </div>

    <div class="emergency-select-wrap">

      <label>
        類別
      </label>

      <select id="typeSelect">

        <option value="all">
          全部類別
        </option>

        <option value="police">
          警察局
        </option>

        <option value="hospital">
          醫院
        </option>

        <option value="fire">
          消防局
        </option>

        <option value="tourism">
          旅遊中心
        </option>

      </select>

    </div>

  </section>

  <!-- List -->
  <section
    class="emergency-list"
    id="emergencyList">

    <!-- JS Render -->

  </section>

  <!-- Footer -->
  <div id="footer"></div>

</main>

<!-- Mobile Menu -->
<div id="mobileMenu"></div>

<script type="module" src="./js/components.js"></script>
<script type="module" src="./js/pages/emergency.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0" />

  <title>HeriLand Emergency</title>

  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/mobile.css" />
  <link rel="stylesheet" href="./css/pages/emergency.css" />
  <link rel="stylesheet" href="./css/mobile/emergency-mobile.css" />
</head>

<body>

<main class="page-container emergency-page">

  <!-- Mobile Top -->
  <header class="mobile-top">

    <div>
      <small>Your Location</small>
      <strong>Kuching, Sarawak</strong>
    </div>

    <button
      class="icon-btn"
      id="mobileMenuBtn"
      aria-label="menu"
    >
      <svg viewBox="0 0 24 24">
        <path d="M4 7h16"></path>
        <path d="M4 12h16"></path>
        <path d="M4 17h16"></path>
      </svg>
    </button>

  </header>

  <!-- Desktop Nav -->
  <div id="navbar"></div>

  <!-- Hero -->
  <section class="emergency-hero">

    <small>Emergency Support</small>

<h1>
  Emergency Contacts
</h1>

<p>
  Find official local contacts quickly if something unexpected happens during your trip.
</p>

  </section>

  <!-- Filters -->
  <section class="emergency-filter">

    <div class="emergency-select-wrap">

<label>
  City
</label>

      <select id="citySelect">

<option value="all">
  All Cities
</option>

        <option value="kuching">
          Kuching
        </option>

        <option value="sibu">
          Sibu
        </option>

        <option value="miri">
          Miri
        </option>

        <option value="bintulu">
          Bintulu
        </option>

      </select>

    </div>

    <div class="emergency-select-wrap">

<label>
  Category
</label>

      <select id="typeSelect">

<option value="all">
  All Categories
</option>

<option value="police">
  Police
</option>

<option value="hospital">
  Hospital
</option>

<option value="fire">
  Fire Department
</option>

<option value="tourism">
  Tourist Information
</option>

      </select>

    </div>

  </section>

  <!-- List -->
<!-- Emergency Table -->
<section class="emergency-table">

<div class="emergency-table-head">
  <span>Agency</span>
  <span>Phone</span>
</div>

  <div
    class="emergency-list"
    id="emergencyList">
  </div>

</section>

  <!-- Footer -->
  <div id="footer"></div>

</main>

<!-- Mobile Menu -->
<div id="mobileMenu"></div>

<script type="module" src="./js/components.js"></script>
<script type="module" src="./js/pages/emergency.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>HeriLand Events</title>

<link rel="stylesheet" href="./css/style.css" />
<link rel="stylesheet" href="./css/pages/event.css" />

<link rel="stylesheet" href="./css/mobile.css" />
<link rel="stylesheet" href="./css/mobile/event-mobile.css" />
</head>

<body>

<main class="page-container event-page">

  <!-- Navbar -->
  <div id="navbar"></div>

  <!-- Mobile Top -->
  <header class="mobile-top">

    <div>
      <small>Your Location</small>
      <strong>Kuching, Sarawak</strong>
    </div>

    <button
      class="icon-btn"
      id="mobileMenuBtn"
      aria-label="menu"
    >
      <svg viewBox="0 0 24 24">
        <path d="M4 7h16"></path>
        <path d="M4 12h16"></path>
        <path d="M4 17h16"></path>
      </svg>
    </button>

  </header>

  <!-- Hero -->
  <section class="event-hero">

    <img
      src="https://images.unsplash.com/photo-1505236858219-8359eb29e329?auto=format&fit=crop&w=1600&q=80"
      alt="Sarawak event"
    >

    <div class="event-hero-content">

      <small>This Week in Sarawak</small>

      <h1>
        最近值得去的活動
      </h1>

      <p>
        從今天、週末到近期活動，
        幫你快速找到現在適合參加的砂拉越體驗。
      </p>

    </div>

  </section>

  <!-- Time Tabs -->
  <section
    class="event-tabs"
    id="eventTabs"
  >

    <button
      class="active"
      data-time="today"
    >
      今天
    </button>

    <button data-time="weekend">
      這週末
    </button>

    <button data-time="recent">
      近期
    </button>

  </section>

  <!-- Type Chips -->
  <section
    class="event-chips"
    id="eventChips"
  >

    <button
      class="active"
      data-type="all"
    >
      全部
    </button>

    <button data-type="night">
      夜市
    </button>

    <button data-type="culture">
      文化
    </button>

    <button data-type="live">
      Live
    </button>

    <button data-type="market">
      市集
    </button>

    <button data-type="outdoor">
      戶外
    </button>

    <button data-type="family">
      親子
    </button>

  </section>

  <!-- AI Note -->
  <section class="event-ai-note">

    <small>AI Guide</small>

    <p id="eventAiText">
      今天比較適合夜市、河邊散步和輕鬆的晚間活動。
    </p>

  </section>

  <!-- Event List -->
  <section class="event-list-section">

    <div class="section-head">

      <div>
        <small>Events</small>

        <h2 id="eventSectionTitle">
          今天推薦
        </h2>
      </div>

    </div>

    <div
      class="event-grid"
      id="eventGrid"
    ></div>

  </section>

  <!-- Footer -->
  <div id="footer"></div>

</main>

<!-- Mobile Menu Component -->
<div id="mobileMenu"></div>

<script type="module" src="./js/components.js"></script>
<script type="module" src="./js/pages/event.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>HeriLand Events</title>

<link rel="stylesheet" href="./css/style.css" />
<link rel="stylesheet" href="./css/pages/event.css" />
<link
  rel="stylesheet"
  href="./css/components/ai-guide.css"
/>
<link rel="stylesheet" href="./css/components/event-card.css"/>

<link rel="stylesheet" href="./css/mobile.css" />
<link rel="stylesheet" href="./css/mobile/detail-mobile.css" />
<link rel="stylesheet" href="./css/mobile/event-mobile.css" />

<link rel="stylesheet" href="./css/pages/event-detail.css">
<link rel="stylesheet" href="./css/mobile/event-detail-mobile.css">
</head>

<body>

<main class="page-container event-page">

  <!-- Navbar -->
  <div id="navbar"></div>

  <!-- Mobile Top -->
  <header class="mobile-top">

    <div>
      <small>Your Location</small>
      <strong>Kuching, Sarawak</strong>
    </div>

    <button
      class="icon-btn"
      id="mobileMenuBtn"
      aria-label="menu"
    >
      <svg viewBox="0 0 24 24">
        <path d="M4 7h16"></path>
        <path d="M4 12h16"></path>
        <path d="M4 17h16"></path>
      </svg>
    </button>

  </header>

  <!-- Hero -->
  <section class="event-hero">

    <img
      src="https://images.unsplash.com/photo-1505236858219-8359eb29e329?auto=format&fit=crop&w=1600&q=80"
      alt="Sarawak event"
    >

    <div class="event-hero-content">

      <small>This Week in Sarawak</small>

<h1>
  Events Worth Visiting
</h1>

<p>
  From today and the weekend to upcoming events,
  find Sarawak experiences worth joining now.
</p>

    </div>

  </section>

  <!-- Time Tabs -->
  <section
    class="event-tabs"
    id="eventTabs"
  >

<button class="active" data-time="today">
  Today
</button>

<button data-time="weekend">
  This Weekend
</button>

<button data-time="recent">
  Upcoming
</button>

  </section>

  <!-- Type Chips -->
  <section
    class="event-chips"
    id="eventChips"
  >

    <button class="active" data-type="all">
  All
</button>

<button data-type="night">
  Night Market
</button>

<button data-type="culture">
  Culture
</button>

<button data-type="live">
  Live
</button>

<button data-type="market">
  Market
</button>

<button data-type="outdoor">
  Outdoor
</button>

<button data-type="family">
  Family
</button>

  </section>

  <!-- AI Note -->
  <section class="event-ai-note">

    <small>AI Guide</small>

<p id="eventAiText">
  Today feels right for night markets, river walks, and easy evening events.
</p>

  </section>

  <!-- Event List -->
  <section class="event-list-section">

    <div class="section-head">

      <div>
        <small>Events</small>

<h2 id="eventSectionTitle">
  Today’s Picks
</h2>
      </div>

    </div>

    <div
      class="event-grid"
      id="eventGrid"
    ></div>

  </section>

  <!-- Footer -->
  <div id="footer"></div>
  
  <div id="aiGuide"></div>

</main>

<!-- Event Detail Page -->
<div id="eventDetailComponent"></div>

<!-- Mobile Menu Component -->
<div id="mobileMenu"></div>

<script type="module" src="./js/components.js"></script>
<script type="module" src="./js/pages/event.js"></script>

</body>
</html>

<!-- Event Detail Page -->
<section
  class="event-detail-page"
  id="eventDetailPage">

  <!-- Hero -->
  <div class="event-detail-hero">

    <button
      class="event-detail-back"
      type="button"
      onclick="closeEventDetail()">
      ‹
    </button>

    <div class="event-detail-actions">

      <button
        class="event-detail-action event-detail-save"
        id="eventDetailSaveBtn"
        type="button"
        aria-label="Save event">
        ♡
      </button>

      <button
        class="event-detail-action event-detail-more"
        id="eventDetailMoreBtn"
        type="button"
        aria-label="More actions">
        ⋯
      </button>

    </div>

    <div
      class="event-detail-slider"
      id="eventDetailSlider">
    </div>

    <div
      class="event-detail-dots"
      id="eventDetailDots">
    </div>

  </div>

  <!-- Content -->
  <div class="event-detail-panel">

    <section class="event-detail-head">

      <div class="event-detail-kicker">
        <span id="eventDetailType">Event</span>
        <span>・</span>
        <span id="eventDetailLocation">Sarawak</span>
      </div>

      <h1 id="eventDetailTitle"></h1>

      <div class="event-detail-meta">
        <span id="eventDetailDate">Upcoming</span>
        <span>｜</span>
        <span id="eventDetailTime">Time TBC</span>
      </div>

    </section>

    <section class="event-detail-guide">

      <small>Event Summary</small>

      <p id="eventDetailAiNote"></p>

    </section>

    <section class="event-detail-info">

      <div class="event-detail-info-item">
        <div class="event-detail-info-label">Venue</div>
        <div
          class="event-detail-info-value"
          id="eventDetailVenue">
        </div>
      </div>

      <div class="event-detail-info-item">
        <div class="event-detail-info-label">Address</div>
        <div
          class="event-detail-info-value"
          id="eventDetailAddress">
        </div>
      </div>

      <div class="event-detail-info-item">
        <div class="event-detail-info-label">Organizer</div>
        <div
          class="event-detail-info-value"
          id="eventDetailOrganizer">
        </div>
      </div>

    </section>

    <section class="event-detail-section">

      <h2>Event Detail</h2>

      <p id="eventDetailDesc"></p>

    </section>

    <section class="event-detail-section">

      <h2>Tags</h2>

      <div
        class="event-detail-tags"
        id="eventDetailTags">
      </div>

    </section>

    <div class="event-detail-links">

      <a
        class="event-detail-link"
        id="eventTicketLink"
        href="#"
        target="_blank"
        rel="noopener">
        Ticket / More Info
      </a>

      <a
        class="event-detail-link"
        id="eventMapLink"
        href="#"
        target="_blank"
        rel="noopener">
        Open Map
      </a>

    </div>

    <section class="event-detail-nearby">

      <h2>Nearby Places to Explore</h2>

      <p id="eventDetailNearby">
        Explore nearby restaurants, river walks, or local places around this event.
      </p>

    </section>

  </div>

</section>

<!-- Event More Sheet -->
<div
  class="event-more-layer"
  id="eventMoreLayer">

  <div
    class="event-more-backdrop"
    id="eventMoreBackdrop">
  </div>

  <div
    class="event-more-menu"
    id="eventMoreMenu">

    <button
      type="button"
      onclick="window.addEventToTrip()">

      <span>⊞</span>
      Add to Trip

    </button>

    <button
      type="button"
      onclick="window.openEventMap()">

      <span>↗</span>
      Open in Maps

    </button>

    <button
      type="button"
      onclick="window.shareEvent()">

      <span>⤴</span>
      Share Event

    </button>

    <button
      type="button"
      onclick="window.saveEventReminder()">

      <span>⏰</span>
      Save Reminder

    </button>

    <button
      type="button"
      onclick="window.continueEventAiGuide()">

      <span>✨</span>
      Continue with AI Guide

    </button>

  </div>

</div>

<!-- Floating Button -->
<button
  class="ai-guide-fab"
  id="aiGuideFab"
  type="button"
>
  ✨
</button>

<!-- AI Guide Sheet -->
<section
  class="ai-guide-sheet"
  id="aiGuideSheet"
>

  <div
    class="ai-guide-backdrop"
    id="aiGuideBackdrop"
  ></div>

  <div class="ai-guide-panel">

    <div class="ai-guide-handle"></div>

    <div class="ai-guide-head">

      <div>
        <small>HeriLand</small>
        <h2>Ask HeriLand</h2>
      </div>

      <button
        id="aiGuideClose"
        type="button"
      >
        ×
      </button>

    </div>

<div class="ai-guide-chat" id="aiGuideContent">

  <div class="guide-message">
    今天想怎麼探索砂拉越？
  </div>

  <div class="guide-chip-group">

    <button type="button" data-guide="restaurant">
      🍜 找餐廳
    </button>

    <button type="button" data-guide="view">
      🌆 看夕陽
    </button>

    <button type="button" data-guide="relax">
      🌿 放鬆散步
    </button>

    <button type="button" data-guide="culture">
      🏮 看文化
    </button>

  </div>

  <div class="ai-guide-results" id="aiGuideResults"></div>

</div>

    <div class="ai-guide-input">

<input
  id="aiGuideInput"
  type="text"
  placeholder="例如：今晚適合去哪裡？"
>

<button id="aiGuideSend" type="button">
  ↗
</button>

    </div>

  </div>

</section>

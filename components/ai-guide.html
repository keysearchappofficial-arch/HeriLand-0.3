<!-- Floating Button -->
<button
  class="ai-guide-fab"
  id="aiGuideFab"
  type="button"
>
  ✨
</button>

<!-- AI Guide Sheet -->
<section
  class="ai-guide-sheet"
  id="aiGuideSheet"
>

  <div
    class="ai-guide-backdrop"
    id="aiGuideBackdrop"
  ></div>

  <div class="ai-guide-panel">

    <div class="ai-guide-handle"></div>

    <div class="ai-guide-head">

      <div>
        <small>HeriLand</small>
        <h2>Ask HeriLand</h2>
      </div>

      <button
        id="aiGuideClose"
        type="button"
      >
        ×
      </button>

    </div>

<div class="ai-guide-chat" id="aiGuideContent">

<div class="guide-message">
  How would you like to explore Sarawak today?
</div>

  <div class="guide-chip-group">

<button type="button" data-guide="restaurant">
  🍜 Find Restaurants
</button>

<button type="button" data-guide="view">
  🌆 Sunset Views
</button>

<button type="button" data-guide="relax">
  🌿 Relaxing Walks
</button>

<button type="button" data-guide="culture">
  🏮 Culture Spots
</button>

  </div>

<div class="ai-guide-result-wrap">

  <button
    class="ai-guide-result-arrow left"
    id="aiGuidePrev"
    type="button"
  >
    ←
  </button>

  <div class="ai-guide-results" id="aiGuideResults"></div>

  <button
    class="ai-guide-result-arrow right"
    id="aiGuideNext"
    type="button"
  >
    →
  </button>

</div>

</div>

    <div class="ai-guide-input">

<input
  id="aiGuideInput"
  type="text"
  placeholder="Example: Where should I go tonight?"
>

<button id="aiGuideSend" type="button">
  ↗
</button>

    </div>

  </div>

</section>

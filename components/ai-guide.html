<!-- Floating Button -->
<button
  class="ai-guide-fab"
  id="aiGuideFab"
  type="button"
>
  ✨
</button>

<!-- AI Guide Sheet -->
<section
  class="ai-guide-sheet"
  id="aiGuideSheet"
>

  <div
    class="ai-guide-backdrop"
    id="aiGuideBackdrop"
  ></div>

  <div class="ai-guide-panel">

    <div class="ai-guide-handle"></div>

    <div class="ai-guide-head">

      <div>
        <small>HeriLand</small>
        <h2>Ask HeriLand</h2>
      </div>

      <button
        id="aiGuideClose"
        type="button"
      >
        ×
      </button>

    </div>

    <div class="ai-guide-chat">

      <div class="guide-message">
        想去哪裡？
      </div>

      <div class="guide-chip-group">

        <button>Kuching → Sibu</button>

        <button>機場 → 市區</button>

        <button>哪裡適合看夕陽？</button>

        <button>適合自駕嗎？</button>

      </div>

    </div>

    <div class="ai-guide-input">

      <input
        type="text"
        placeholder="問 HeriLand..."
      >

      <button type="button">
        ↗
      </button>

    </div>

  </div>

</section>

<!-- Traveler Detail Page -->
<section class="traveler-detail-page" id="travelerDetailPage">

  <div class="traveler-detail-hero">

    <button
      class="traveler-detail-back"
      type="button"
      onclick="closeTravelerDetail()">
      ‹
    </button>

    <div class="traveler-detail-actions">

      <button
        class="traveler-detail-action traveler-detail-save"
        id="travelerDetailSaveBtn"
        type="button"
        aria-label="Save story">
        ♡
      </button>

      <button
        class="traveler-detail-action traveler-detail-more"
        id="travelerDetailMoreBtn"
        type="button"
        aria-label="More actions">
        ⋯
      </button>

    </div>

    <div
      class="traveler-detail-slider"
      id="travelerDetailSlider">
    </div>

    <div
      class="traveler-detail-dots"
      id="travelerDetailDots">
    </div>

    <div class="traveler-detail-overlay">
      <small>Traveler Story</small>

      <h1 id="travelerDetailName">
        HeriLand Traveler
      </h1>

      <p id="travelerDetailAchievement">
        Explored 12 Cities ・ 28 Stories
      </p>
    </div>

  </div>

  <div class="traveler-detail-panel">

    <article class="traveler-story">

      <h2 id="travelerDetailTitle">
        A Journey Taken Slowly
      </h2>

      <p id="travelerDetailStory">
        This journey was never about rushing through attractions, but about feeling the rhythm of the city.
      </p>

    </article>

    <div
      class="traveler-detail-tags"
      id="travelerDetailTags">

      <span>#SlowTravel</span>
      <span>#Sarawak</span>
      <span>#RiverWalk</span>

    </div>

  </div>

  <!-- Traveler More Sheet -->
  <div
    class="traveler-more-layer"
    id="travelerMoreLayer">

    <div
      class="traveler-more-backdrop"
      id="travelerMoreBackdrop">
    </div>

    <div
      class="traveler-more-menu"
      id="travelerMoreMenu">

      <button type="button" onclick="window.saveTravelerStory()">
        <span>♡</span>
        Save Story
      </button>

      <button type="button" onclick="window.saveTravelerRoute()">
        <span>⊞</span>
        Save Route
      </button>

      <button type="button" onclick="window.shareTravelerStory()">
        <span>⤴</span>
        Share Story
      </button>

      <button type="button" onclick="window.openTravelerMap()">
        <span>↗</span>
        Open Route Map
      </button>

      <button type="button" onclick="window.continueTravelerAiGuide()">
        <span>✨</span>
        Continue with AI Guide
      </button>

    </div>

  </div>

</section>

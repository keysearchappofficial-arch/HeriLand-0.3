<!DOCTYPE html>
<html lang="zh-Hant">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>HeriLand Feedback</title>

  <link rel="stylesheet" href="./css/style.css" />

  <link
    rel="stylesheet"
    href="./css/pages/feedback.css"
  />

  <link
    rel="stylesheet"
    href="./css/mobile.css"
  />

  <link
    rel="stylesheet"
    href="./css/mobile/feedback-mobile.css"
  />

</head>

<body>

<main class="page-container feedback-page">

  <header class="mobile-top">

    <div>
      <small>HeriLand</small>
      <strong>Feedback</strong>
    </div>

    <button
      class="icon-btn"
      id="mobileMenuBtn"
      aria-label="menu"
    >
      <svg viewBox="0 0 24 24">
        <path d="M4 7h16"></path>
        <path d="M4 12h16"></path>
        <path d="M4 17h16"></path>
      </svg>
    </button>

  </header>

  <div id="navbar"></div>

  <section class="feedback-hero">

    <small>Feedback</small>

    <h1>
      幫助 HeriLand
      <br>
      變得更好
    </h1>

    <p>
      你可以回報問題、推薦景點或餐廳，
      也可以提供優化建議與商家合作資訊。
    </p>

  </section>

  <section class="feedback-form-section">

    <div class="feedback-form-card">

      <div class="feedback-field">

        <label for="feedbackType">
          類型
        </label>

        <select id="feedbackType">

          <option value="problem">
            問題回報
          </option>

          <option value="place">
            景點推薦
          </option>

          <option value="restaurant">
            餐廳推薦
          </option>

          <option value="suggestion">
            優化建議
          </option>

          <option value="business">
            商家合作
          </option>

          <option value="other">
            其他
          </option>

        </select>

      </div>

      <div class="feedback-field">

        <label for="feedbackTitle">
          標題
        </label>

        <input
          id="feedbackTitle"
          type="text"
          placeholder="例如：推薦一間 Sibu 早餐店"
        />

      </div>

      <div class="feedback-field">

        <label for="feedbackMessage">
          說明
        </label>

        <textarea
          id="feedbackMessage"
          placeholder="請簡單說明你想回報或推薦的內容"
        ></textarea>

      </div>

      <div class="feedback-field">

        <label for="feedbackAddress">
          地址
        </label>

        <input
          id="feedbackAddress"
          type="text"
          placeholder="可填寫地址、區域或 Google Maps 名稱"
        />

      </div>

      <div class="feedback-field">

        <label for="feedbackHours">
          營業時間
        </label>

        <input
          id="feedbackHours"
          type="text"
          placeholder="例如：早上至中午 / 10:00 AM – 9:00 PM"
        />

      </div>

      <div class="feedback-field">

        <label for="feedbackTags">
          特色
        </label>

        <input
          id="feedbackTags"
          type="text"
          placeholder="例如：Kampua Mee、早餐、在地小店"
        />

      </div>

      <div class="feedback-field">

        <label for="feedbackContact">
          聯絡方式（選填）
        </label>

        <input
          id="feedbackContact"
          type="text"
          placeholder="你的 Email / WhatsApp / IG"
        />

      </div>

      <div class="feedback-field">

        <label for="feedbackImages">
          上傳圖片
        </label>

        <input
          id="feedbackImages"
          type="file"
          accept="image/*"
          multiple
        />

        <small class="feedback-help-text">
          可上傳景點、餐廳、菜單、招牌或錯誤資訊截圖。
        </small>

      </div>

      <button
        class="feedback-submit-btn"
        id="feedbackSubmitBtn"
        type="button"
      >
        送出 Feedback
      </button>

      <p class="feedback-note">
        HeriLand 目前仍在持續更新中，
        感謝你一起讓 Sarawak 的探索資料更完整。
      </p>

    </div>

  </section>

  <div id="footer"></div>

</main>

<div id="mobileMenu"></div>

<script type="module" src="./js/components.js"></script>

<script
  type="module"
  src="./js/pages/feedback.js"
></script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>HeriLand Transport</title>

  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/pages/transport.css" />

  <link rel="stylesheet" href="./css/mobile.css" />
  <link rel="stylesheet" href="./css/mobile/detail-mobile.css" />
  <link rel="stylesheet" href="./css/mobile/transport-mobile.css" />
</head>

<body>

<main class="page-container transport-page">

  <div id="navbar"></div>

  <header class="mobile-top">
    <div>
      <small>Move around</small>
      <strong>Sarawak Transport</strong>
    </div>

    <button class="icon-btn" id="mobileMenuBtn" aria-label="menu">
      <svg viewBox="0 0 24 24">
        <path d="M4 7h16"></path>
        <path d="M4 12h16"></path>
        <path d="M4 17h16"></path>
      </svg>
    </button>
  </header>

  <section class="transport-search-hero">

    <div class="transport-search-bg">
      <img
        src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1600&q=80"
        alt="Sarawak road"
      >
    </div>

    <div class="transport-search-content">
      <small>HeriLand Transport</small>

      <h1>今天想去哪？</h1>

      <p>
        在砂拉越，舒服地移動，
        讓旅程更順、更好玩。
      </p>

      <div class="transport-search-box">
        <svg viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="7"></circle>
          <path d="M16.5 16.5L21 21"></path>
        </svg>

        <input
          id="routeSearchInput"
          type="text"
          placeholder="搜尋地點，例如：Kuching、機場、Sibu"
          autocomplete="off"
        >

        <button id="routeSearchClear" type="button">×</button>
      </div>
    </div>

  </section>

  <section class="transport-result-section" id="transportResultSection">
    <div class="transport-section-head">
      <h2>搜尋結果</h2>
      <button id="routeSearchCancel" type="button">取消</button>
    </div>

    <div class="transport-route-list" id="searchResultList"></div>
  </section>

  <section class="transport-route-section">

    <div class="transport-section-head">
      <h2>常見路線</h2>

      <button id="openAllRoutesBtn" type="button">
        查看全部
        <span>›</span>
      </button>
    </div>

    <div class="transport-route-list" id="commonRouteList">

      <button class="transport-route-row" type="button">
        <span class="route-main">
          <small>南區 - 西區</small>
          <span>Kuching - Santubong</span>
        </span>
        <strong>›</strong>
      </button>

      <button class="transport-route-row" type="button">
        <span class="route-main">
          <small>南區 - 南區</small>
          <span>Kuching - Serian</span>
        </span>
        <strong>›</strong>
      </button>

      <button class="transport-route-row" type="button">
        <span class="route-main">
          <small>南區 - 中區</small>
          <span>Kuching - Sibu</span>
        </span>
        <strong>›</strong>
      </button>

      <button class="transport-route-row" type="button">
        <span class="route-main">
          <small>砂拉越 - 汶萊</small>
          <span>Miri - Brunei</span>
        </span>
        <strong>›</strong>
      </button>

    </div>

  </section>

  <section class="transport-recent-section">

    <div class="transport-section-head">
      <h2>最近搜尋</h2>

      <button type="button">
        清除
      </button>
    </div>

    <div class="transport-recent-tags">
      <button type="button">Kuching - Santubong <span>×</span></button>
      <button type="button">Kuching - Sibu <span>×</span></button>
      <button type="button">機場 - Kuching <span>×</span></button>
    </div>

  </section>

  <div id="footer"></div>

</main>

<section class="transport-sub-view" id="allRoutesView">

  <div class="transport-sub-head">
    <button type="button" id="allRoutesBack">‹</button>

    <div>
      <small>Routes</small>
      <h2>全部路線</h2>
    </div>
  </div>

  <div class="transport-sub-search">
    <input
      id="allRouteSearchInput"
      type="text"
      placeholder="搜尋城市或目的地"
    >
  </div>

  <div class="all-route-list" id="allRouteList">

    <section class="route-alpha-group" data-alpha="B">
      <h3>B</h3>

      <button class="transport-route-row" type="button">
        <span class="route-main">
          <small>中區 - 北區</small>
          <span>Bintulu - Miri</span>
        </span>
        <strong>›</strong>
      </button>
    </section>

    <section class="route-alpha-group" data-alpha="K">
      <h3>K</h3>

      <button class="transport-route-row" type="button">
        <span class="route-main">
          <small>南區 - 西區</small>
          <span>Kuching - Santubong</span>
        </span>
        <strong>›</strong>
      </button>

      <button class="transport-route-row" type="button">
        <span class="route-main">
          <small>南區 - 南區</small>
          <span>Kuching - Serian</span>
        </span>
        <strong>›</strong>
      </button>

      <button class="transport-route-row" type="button">
        <span class="route-main">
          <small>南區 - 中區</small>
          <span>Kuching - Sibu</span>
        </span>
        <strong>›</strong>
      </button>

      <button class="transport-route-row" type="button">
        <span class="route-main">
          <small>南區 - 西區</small>
          <span>Kuching - Bau</span>
        </span>
        <strong>›</strong>
      </button>

      <button class="transport-route-row" type="button">
        <span class="route-main">
          <small>南區 - 南區</small>
          <span>Kuching - Sri Aman</span>
        </span>
        <strong>›</strong>
      </button>
    </section>

    <section class="route-alpha-group" data-alpha="M">
      <h3>M</h3>

      <button class="transport-route-row" type="button">
        <span class="route-main">
          <small>砂拉越 - 汶萊</small>
          <span>Miri - Brunei</span>
        </span>
        <strong>›</strong>
      </button>
    </section>

    <section class="route-alpha-group" data-alpha="S">
      <h3>S</h3>

      <button class="transport-route-row" type="button">
        <span class="route-main">
          <small>中區 - 北區</small>
          <span>Sibu - Bintulu</span>
        </span>
        <strong>›</strong>
      </button>
    </section>

  </div>

  <div class="route-alpha-index">
    <button data-jump-alpha="B">B</button>
    <button data-jump-alpha="K">K</button>
    <button data-jump-alpha="M">M</button>
    <button data-jump-alpha="S">S</button>
  </div>

</section>

<section class="transport-route-detail" id="routeDetail">
  <div class="route-detail-backdrop" id="routeDetailBackdrop"></div>

  <div class="route-detail-panel">

    <div class="route-detail-head">
      <button id="routeDetailClose" type="button">‹</button>

      <div>
        <small id="routeDetailRegion">南區 - 中區</small>
        <h2 id="routeDetailTitle">Kuching - Sibu</h2>
      </div>
    </div>

    <section class="route-detail-guide">
      <small>HeriLand Guide</small>
      <p id="routeDetailDesc">
        如果時間有限，飛機會比較舒服。想省預算可以考慮長途巴士，但要預留更多時間。
      </p>
    </section>

    <section class="route-detail-list">

      <div class="route-detail-row">
        <span>時間</span>
        <strong id="routeDetailTime">飛機約 45 分鐘</strong>
      </div>

      <div class="route-detail-row">
        <span>方式</span>
        <strong id="routeDetailMethod">飛機 / 長途巴士</strong>
      </div>

      <div class="route-detail-row">
        <span>提醒</span>
        <strong id="routeDetailNote">巴士時間較長</strong>
      </div>

    </section>

  </div>
</section>

<div id="mobileMenu"></div>

<script type="module" src="./js/components.js"></script>
<script type="module" src="./js/pages/transport.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>HeriLand Admin</title>

  <link rel="stylesheet" href="./css/pages/heriland-admin.css">
</head>

<body>

  <main class="admin-app">

    <header class="admin-top">
      <div>
        <h1>HeriLand Admin</h1>
        <p>Community submissions review</p>
      </div>

      <button id="refreshBtn" type="button">
        Refresh
      </button>
    </header>

    <section class="admin-toolbar">

      <select id="typeFilter">
        <option value="all">All Types</option>
        <option value="place">Place</option>
        <option value="restaurant">Restaurant</option>
        <option value="event">Event</option>
        <option value="culture">Culture</option>
        <option value="travel-tip">Travel Tip</option>
        <option value="correction">Correction</option>
      </select>

      <select id="statusFilter">
        <option value="all">All Status</option>
        <option value="pending">Pending</option>
        <option value="published">Published</option>
        <option value="rejected">Rejected</option>
      </select>

      <button id="batchPublishBtn" type="button">
        Batch Publish
      </button>

      <button id="batchRejectBtn" type="button">
        Batch Reject
      </button>

      <button id="batchSaveBtn" type="button">
        Save Edited
      </button>

    </section>

    <section class="admin-table-wrap">

      <table class="admin-table">
        <thead>
          <tr>
            <th>
              <input type="checkbox" id="checkAll">
            </th>

            <th>Type</th>
            <th>Status</th>
            <th>Name</th>
            <th>City</th>
            <th>Area</th>
            <th>Address</th>
            <th>Short Desc</th>
            <th>Full Desc</th>
            <th>Admin Note</th>
            <th>Save</th>
          </tr>
        </thead>

        <tbody id="submissionTableBody">
          <tr>
            <td colspan="11">
              Loading...
            </td>
          </tr>
        </tbody>
      </table>

    </section>

  </main>

  <div class="reject-layer" id="rejectLayer">

    <div
      class="reject-backdrop"
      id="rejectBackdrop"
    ></div>

    <div class="reject-panel">

      <h2>Reject Submission</h2>

      <p>
        Please add a reason for rejecting this submission.
      </p>

      <textarea
        id="rejectReasonInput"
        placeholder="Reason..."
      ></textarea>

      <div class="reject-actions">

        <button
          id="rejectCancelBtn"
          type="button"
        >
          Cancel
        </button>

        <button
          id="rejectConfirmBtn"
          type="button"
        >
          Reject
        </button>

      </div>

    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/supabase-client.js"></script>
  <script src="./js/heriland-admin.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>HeriLand My Page</title>

  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/pages/my.css" />
  <link rel="stylesheet" href="./css/mobile.css" />
</head>

<body>

<main class="page-container my-page">

  <!-- Navbar -->
  <div id="navbar"></div>

  <!-- Mobile Top -->
  <header class="mobile-top">
    <div>
      <small>Your Profile</small>
      <strong>我的 HeriLand</strong>
    </div>

    <button class="icon-btn" id="mobileMenuBtn" aria-label="menu">
      <svg viewBox="0 0 24 24">
        <path d="M4 7h16"></path>
        <path d="M4 12h16"></path>
        <path d="M4 17h16"></path>
      </svg>
    </button>
  </header>

 <div class="my-nav-stack" id="myNavStack">

  <!-- 主頁 -->
  <section class="my-view my-view-main" id="myMainView">

    <section class="my-ios-summary">
      <div class="my-avatar">H</div>

      <div>
        <h1>我的 HeriLand</h1>
        <p>慢旅探索中 · Kuching, Sarawak</p>
      </div>
    </section>

    <section class="my-ios-list">

      <button class="my-ios-row" type="button" data-open-view="savedView">
        <div>
          <span>我的收藏</span>
          <small>12 個收藏地點</small>
        </div>
        <strong>›</strong>
      </button>

      <button class="my-ios-row" type="button" data-open-view="tripView">
        <div>
          <span>我的行程</span>
          <small>3 個旅行計畫</small>
        </div>
        <strong>›</strong>
      </button>

      <button class="my-ios-row" type="button" data-open-view="recentView">
        <div>
          <span>最近看過</span>
          <small>8 個瀏覽紀錄</small>
        </div>
        <strong>›</strong>
      </button>

    </section>

    <section class="my-ios-list">

      <button class="my-ios-row" type="button">
        <div>
          <span>AI Guide 偏好</span>
          <small>慢旅、美食、河邊、低人潮</small>
        </div>
        <strong>›</strong>
      </button>

<button
  class="my-ios-row"
  type="button"
  data-open-view="languageView"
>
  <div>
    <span>語言與地區</span>
    <small>繁體中文 · Sarawak</small>
  </div>

  <strong>›</strong>
</button>

      <button class="my-ios-row" type="button">
        <div>
          <span>登入 / 會員</span>
          <small>管理帳號與同步資料</small>
        </div>
        <strong>›</strong>
      </button>

    </section>

  </section>

  <!-- 收藏頁 -->
  <section class="my-view my-view-sub" id="savedView">
    <div class="my-sub-head">
      <button type="button" data-back-view>‹</button>
      <h2>我的收藏</h2>
    </div>

    <div class="my-sheet-grid" id="savedSheetGrid"></div>
  </section>

  <!-- 行程頁 -->
  <section class="my-view my-view-sub" id="tripView">
    <div class="my-sub-head">
      <button type="button" data-back-view>‹</button>
      <h2>我的行程</h2>
    </div>

    <div class="trip-sheet-grid" id="tripSheetGrid"></div>
  </section>

  <!-- 最近看過頁 -->
  <section class="my-view my-view-sub" id="recentView">
    <div class="my-sub-head">
      <button type="button" data-back-view>‹</button>
      <h2>最近看過</h2>
    </div>

    <div class="recent-sheet-list" id="recentSheetList"></div>
  </section>

<!-- Language & Region -->
<section class="my-view my-view-sub" id="languageView">

  <div class="my-sub-head">

    <button type="button" data-back-view>
      ‹
    </button>

    <h2>語言與地區</h2>

  </div>

  <!-- Group -->
  <div class="my-settings-group">

    <small>Language</small>

    <button class="my-settings-row active">
      <span>繁體中文</span>
      <strong>✓</strong>
    </button>

    <button class="my-settings-row">
      <span>English</span>
    </button>

    <button class="my-settings-row">
      <span>Bahasa Melayu</span>
    </button>

  </div>

  <!-- Group -->
  <div class="my-settings-group">

    <small>Region</small>

    <button class="my-settings-row active">
      <span>Sarawak</span>
      <strong>✓</strong>
    </button>

    <button class="my-settings-row">
      <span>Taipei</span>
    </button>

    <button class="my-settings-row">
      <span>Seoul</span>
    </button>

    <button class="my-settings-row">
      <span>Tokyo</span>
    </button>

  </div>

  <!-- Group -->
  <div class="my-settings-group">

    <small>Currency</small>

    <button class="my-settings-row active">
      <span>RM</span>
      <strong>✓</strong>
    </button>

    <button class="my-settings-row">
      <span>NTD</span>
    </button>

    <button class="my-settings-row">
      <span>KRW</span>
    </button>

  </div>

</section>

</div>

  <!-- Footer -->
  <div id="footer"></div>

</main>

<!-- Mobile Menu Component -->
<div id="mobileMenu"></div>

<script type="module" src="./js/components.js"></script>
<script type="module" src="./js/pages/my.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>HeriLand My Page</title>

<link rel="stylesheet" href="./css/style.css" />
<link rel="stylesheet" href="./css/pages/my.css" />

<link rel="stylesheet" href="./css/mobile.css" />
<link rel="stylesheet" href="./css/mobile/detail-mobile.css" />
<link rel="stylesheet" href="./css/mobile/my-mobile.css" />
</head>

<body>

<main class="page-container my-page">

  <!-- Navbar -->
  <div id="navbar"></div>

  <!-- Mobile Top -->
  <header class="mobile-top">
    <div>
      <small>Your Profile</small>
      <strong>我的 HeriLand</strong>
    </div>

    <button class="icon-btn" id="mobileMenuBtn" aria-label="menu">
      <svg viewBox="0 0 24 24">
        <path d="M4 7h16"></path>
        <path d="M4 12h16"></path>
        <path d="M4 17h16"></path>
      </svg>
    </button>
  </header>

 <div class="my-nav-stack" id="myNavStack">

  <!-- 主頁 -->
  <section class="my-view my-view-main" id="myMainView">

<section class="my-ios-summary">
  <div class="my-avatar">A</div>

  <div class="my-profile-main">
    <h1>Hey, Andy</h1>
    <p>正在探索 Kuching</p>
  </div>

  <div class="my-level-badge">
    Lv.3
  </div>
</section>

<!-- Group 1: Main -->
<section class="my-ios-list">

  <button class="my-ios-row" type="button" data-open-view="savedView">
    <span class="my-row-icon">♡</span>

    <div class="my-row-main">
      <span>我的收藏</span>
    </div>

    <div class="my-row-side">
      <em>12</em>
      <strong>›</strong>
    </div>
  </button>

  <button class="my-ios-row" type="button" data-open-view="tripView">
    <span class="my-row-icon">⌘</span>

    <div class="my-row-main">
      <span>我的行程</span>
    </div>

    <div class="my-row-side">
      <em>3</em>
      <strong>›</strong>
    </div>
  </button>

  <button class="my-ios-row" type="button" data-open-view="recentView">
    <span class="my-row-icon">◷</span>

    <div class="my-row-main">
      <span>最近看過</span>
    </div>

    <div class="my-row-side">
      <em>8</em>
      <strong>›</strong>
    </div>
  </button>

</section>

<!-- Group 2: AI -->
<section class="my-ios-list">

  <button class="my-ios-row" type="button" data-open-view="aiObserveView">
    <span class="my-row-icon">✦</span>

    <div class="my-row-main">
      <span>AI Guide 觀察</span>
    </div>

    <div class="my-row-side">
      <em>慢旅</em>
      <strong>›</strong>
    </div>
  </button>

</section>

<!-- Group 3: Settings -->
<section class="my-ios-list">

  <button class="my-ios-row" type="button" data-open-view="languageView">
    <span class="my-row-icon">文</span>

    <div class="my-row-main">
      <span>語言</span>
    </div>

    <div class="my-row-side">
      <em>繁中</em>
      <strong>›</strong>
    </div>
  </button>

  <button class="my-ios-row" type="button" data-open-view="currencyView">
    <span class="my-row-icon">$</span>

    <div class="my-row-main">
      <span>貨幣</span>
    </div>

    <div class="my-row-side">
      <em>RM</em>
      <strong>›</strong>
    </div>
  </button>

  <button class="my-ios-row" type="button" data-open-view="accountView">
    <span class="my-row-icon">○</span>

    <div class="my-row-main">
      <span>會員</span>
    </div>

    <div class="my-row-side">
      <em>未登入</em>
      <strong>›</strong>
    </div>
  </button>

</section>

<!-- Group 4: Info -->
<section class="my-ios-list my-ios-list-secondary">

  <button class="my-ios-row" type="button">
    <div class="my-row-main">
      <span>Terms & Privacy</span>
    </div>

    <div class="my-row-side">
      <strong>›</strong>
    </div>
  </button>

  <button class="my-ios-row" type="button">
    <div class="my-row-main">
      <span>Help Center</span>
    </div>

    <div class="my-row-side">
      <strong>›</strong>
    </div>
  </button>

  <button class="my-ios-row" type="button">
    <div class="my-row-main">
      <span>About HeriLand</span>
    </div>

    <div class="my-row-side">
      <strong>›</strong>
    </div>
  </button>

  <button class="my-ios-row" type="button">
    <div class="my-row-main">
      <span>Clear Cache</span>
    </div>

    <div class="my-row-side">
      <strong>›</strong>
    </div>
  </button>

</section>

<div class="my-version">
  HeriLand v0.9
</div>

</section>


  <!-- 收藏頁 -->
  <section class="my-view my-view-sub" id="savedView">
    <div class="my-sub-head">
      <button type="button" data-back-view>‹</button>
      <h2>我的收藏</h2>
    </div>

    <div class="my-sheet-grid" id="savedSheetGrid"></div>
  </section>

  <!-- 行程頁 -->
  <section class="my-view my-view-sub" id="tripView">
    <div class="my-sub-head">
      <button type="button" data-back-view>‹</button>
      <h2>我的行程</h2>
    </div>

    <div class="trip-sheet-grid" id="tripSheetGrid"></div>
  </section>

  <!-- 最近看過頁 -->
  <section class="my-view my-view-sub" id="recentView">
    <div class="my-sub-head">
      <button type="button" data-back-view>‹</button>
      <h2>最近看過</h2>
    </div>

    <div class="recent-sheet-list" id="recentSheetList"></div>
  </section>

<!-- Language & Region -->
<section class="my-view my-view-sub" id="languageView">

  <div class="my-sub-head">

    <button type="button" data-back-view>
      ‹
    </button>

    <h2>語言</h2>

  </div>

  <!-- Group -->
  <div class="my-settings-group">

    <small>Language</small>

    <button class="my-settings-row active">
      <span>繁體中文</span>
      <strong>✓</strong>
    </button>

    <button class="my-settings-row">
      <span>English</span>
    </button>

    <button class="my-settings-row">
      <span>Bahasa Melayu</span>
    </button>

  </div>

</section>

<!-- Currency -->
<section class="my-view my-view-sub" id="currencyView">

  <div class="my-sub-head">
    <button type="button" data-back-view>‹</button>
    <h2>貨幣</h2>
  </div>

  <div class="my-settings-group">

    <button class="my-settings-row active">
      <span>RM</span>
      <strong>✓</strong>
    </button>

    <button class="my-settings-row">
      <span>NTD</span>
    </button>

    <button class="my-settings-row">
      <span>KRW</span>
    </button>

    <button class="my-settings-row">
      <span>JPY</span>
    </button>

    <button class="my-settings-row">
      <span>USD</span>
    </button>

  </div>

</section>

<!-- AI Observation -->
<section class="my-view my-view-sub" id="aiObserveView">

  <div class="my-sub-head">
    <button type="button" data-back-view>‹</button>
    <h2>AI Guide 觀察</h2>
  </div>

  <section class="account-card">
    <small>Travel Pattern</small>
    <h3>慢旅探索型</h3>
    <p>
      你最近比較常查看河邊、低人潮、美食和傍晚活動。
      HeriLand 會優先推薦比較舒服、不趕路的探索方向。
    </p>
  </section>

</section>

<!-- Account / Member -->
<section class="my-view my-view-sub" id="accountView">

  <div class="my-sub-head">
    <button type="button" data-back-view>‹</button>
    <h2>登入 / 會員</h2>
  </div>

  <section class="account-card">
    <div class="account-avatar">H</div>

    <div>
      <small>HeriLand Account</small>
      <h3>尚未登入</h3>
      <p>
        登入後可以修改個人資料、儲存旅行推薦，
        並累積你的旅人徽章。
      </p>
    </div>

    <button class="account-primary-btn" type="button">
      登入 / 建立帳號
    </button>
  </section>

  <div class="my-settings-group">
    <small>Profile</small>

    <button class="my-settings-row">
      <span>個人資料</span>
      <strong>›</strong>
    </button>

    <button class="my-settings-row">
      <span>修改名字</span>
      <strong>›</strong>
    </button>
  </div>

  <div class="my-settings-group">
    <small>Travel</small>

    <button class="my-settings-row">
      <span>儲存旅行</span>
      <strong>›</strong>
    </button>

    <button class="my-settings-row">
      <span>我收藏的推薦行程</span>
      <strong>›</strong>
    </button>

    <button class="my-settings-row">
      <span>我發布的推薦</span>
      <strong>›</strong>
    </button>
  </div>

  <div class="my-settings-group">
    <small>Badges</small>

    <button class="my-settings-row">
      <span>慢旅探索者</span>
      <strong>Lv.1</strong>
    </button>

    <button class="my-settings-row">
      <span>美食獵人</span>
      <strong>Lv.1</strong>
    </button>

    <button class="my-settings-row">
      <span>城市漫遊者</span>
      <strong>Lv.1</strong>
    </button>
  </div>

</section>

</div>

  <!-- Footer -->
  <div id="footer"></div>

</main>

<!-- Mobile Menu Component -->
<div id="mobileMenu"></div>

<script type="module" src="./js/components.js"></script>
<script type="module" src="./js/pages/my.js"></script>

</body>
</html>

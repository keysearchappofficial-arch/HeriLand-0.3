<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>HeriLand My Page</title>

  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/pages/my.css" />
  <link rel="stylesheet" href="./css/mobile.css" />
</head>

<body>

<main class="page-container my-page">

  <!-- Navbar -->
  <div id="navbar"></div>

  <!-- Mobile Top -->
  <header class="mobile-top">
    <div>
      <small>Your Profile</small>
      <strong>我的 HeriLand</strong>
    </div>

    <button class="icon-btn" id="mobileMenuBtn" aria-label="menu">
      <svg viewBox="0 0 24 24">
        <path d="M4 7h16"></path>
        <path d="M4 12h16"></path>
        <path d="M4 17h16"></path>
      </svg>
    </button>
  </header>

  <!-- Profile Hero -->
  <section class="my-hero">

    <div class="my-profile-card">
      <div class="my-avatar">H</div>

      <div>
        <small>Traveler Profile</small>
        <h1>我的 HeriLand</h1>
        <p>收藏你想去的地方、整理行程，讓 AI Guide 更懂你的旅行節奏。</p>
      </div>
    </div>

    <div class="my-status-card">
      <small>Current Mode</small>
      <strong>慢旅探索中</strong>
      <p>偏好：美食、河邊、低人潮、傍晚活動</p>
    </div>

  </section>

  <!-- Profile Summary -->
<section class="my-ios-summary">
  <div class="my-avatar">H</div>

  <div>
    <h1>我的 HeriLand</h1>
    <p>慢旅探索中 · Kuching, Sarawak</p>
  </div>
</section>

<!-- iOS Setting List -->
<section class="my-ios-list">

  <button class="my-ios-row" type="button" data-open-sheet="savedSheet">
    <div>
      <span>我的收藏</span>
      <small>12 個收藏地點</small>
    </div>
    <strong>›</strong>
  </button>

  <button class="my-ios-row" type="button" data-open-sheet="tripSheet">
    <div>
      <span>我的行程</span>
      <small>3 個旅行計畫</small>
    </div>
    <strong>›</strong>
  </button>

  <button class="my-ios-row" type="button" data-open-sheet="recentSheet">
    <div>
      <span>最近看過</span>
      <small>8 個瀏覽紀錄</small>
    </div>
    <strong>›</strong>
  </button>

</section>

<section class="my-ios-list">

  <button class="my-ios-row" type="button">
    <div>
      <span>AI Guide 偏好</span>
      <small>慢旅、美食、河邊、低人潮</small>
    </div>
    <strong>›</strong>
  </button>

  <button class="my-ios-row" type="button">
    <div>
      <span>語言與地區</span>
      <small>繁體中文 · Sarawak</small>
    </div>
    <strong>›</strong>
  </button>

  <button class="my-ios-row" type="button">
    <div>
      <span>登入 / 會員</span>
      <small>管理帳號與同步資料</small>
    </div>
    <strong>›</strong>
  </button>

</section>

  <!-- Saved Sheet -->
<section class="my-sheet" id="savedSheet">
  <div class="my-sheet-backdrop" data-close-sheet="savedSheet"></div>

  <div class="my-sheet-panel">
    <div class="my-sheet-head">
      <div>
        <small>Saved Places</small>
        <h2>我的收藏</h2>
      </div>
      <button type="button" data-close-sheet="savedSheet">×</button>
    </div>

    <div class="my-sheet-grid" id="savedSheetGrid"></div>
  </div>
</section>

<!-- Trip Sheet -->
<section class="my-sheet" id="tripSheet">
  <div class="my-sheet-backdrop" data-close-sheet="tripSheet"></div>

  <div class="my-sheet-panel">
    <div class="my-sheet-head">
      <div>
        <small>Trip Plans</small>
        <h2>我的行程</h2>
      </div>
      <button type="button" data-close-sheet="tripSheet">×</button>
    </div>

    <div class="trip-sheet-grid" id="tripSheetGrid"></div>
  </div>
</section>

<!-- Recent Sheet -->
<section class="my-sheet" id="recentSheet">
  <div class="my-sheet-backdrop" data-close-sheet="recentSheet"></div>

  <div class="my-sheet-panel">
    <div class="my-sheet-head">
      <div>
        <small>Recently Viewed</small>
        <h2>最近看過</h2>
      </div>
      <button type="button" data-close-sheet="recentSheet">×</button>
    </div>

    <div class="recent-sheet-list" id="recentSheetList"></div>
  </div>
</section>

  <!-- Footer -->
  <div id="footer"></div>

</main>

<!-- Mobile Menu Component -->
<div id="mobileMenu"></div>

<script type="module" src="./js/components.js"></script>
<script type="module" src="./js/pages/my.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HeriLand Cities</title>

<link rel="stylesheet" href="./css/style.css" />
<link rel="stylesheet" href="./css/pages/city.css" />
<link rel="stylesheet" href="./css/mobile.css" />
</head>

<body>

<main class="page-container city-page">

  <!-- Mobile Top -->
<header class="mobile-top">

  <div>
    <small>Your Location</small>
    <strong>Kuching, Sarawak</strong>
  </div>

  <button
    class="icon-btn"
    id="mobileMenuBtn"
    aria-label="menu"
  >
    <svg viewBox="0 0 24 24">
      <path d="M4 7h16"></path>
      <path d="M4 12h16"></path>
      <path d="M4 17h16"></path>
    </svg>
  </button>

</header>

  <!-- Desktop / Page Top Nav -->
  <div id="navbar"></div>

  <!-- City Top -->
  <section class="city-top">
    <div class="city-top-head">
      <h1>Explore Sarawak</h1>
      <p>選擇一個城市開始探索</p>
    </div>

    <div class="city-tabs" id="cityTabs"></div>
  </section>

  <!-- Current City Hero -->
  <section class="city-hero">
    <img id="cityHeroImage" src="" alt="">

    <div class="city-hero-content">
      <small>HeriLand City Guide</small>
      <h2 id="cityHeroTitle">Kuching</h2>
      <p id="cityHeroDesc">
        從城市散步、美食、景點和活動開始探索砂拉越。
      </p>
    </div>
  </section>

  <!-- AI City Hint -->
  <section class="city-ai-note">
    <div>
      <small>AI Guide</small>
      <p id="cityAiText">
        第一次來 Kuching？建議先從河邊、老街和在地美食開始。
      </p>
    </div>
  </section>

<section class="city-spot-section">

  <div class="section-head">

    <div>
      <small>Explore</small>
      <h2>景點推薦</h2>
    </div>

    <button
      class="more-btn"
      id="spotMoreBtn"
      type="button"
    >
      更多
    </button>

  </div>

<div class="spot-scroll-wrap">
  <div class="spot-grid" id="spotGrid"></div>
</div>

</section>

<section class="city-food-section">

  <div class="section-head">

    <div>
      <small>Food</small>
      <h2>美食推薦</h2>
    </div>

    <button
      class="more-btn"
      id="foodMoreBtn"
      type="button"
    >
      更多
    </button>

  </div>

  <div class="food-grid" id="foodGrid"></div>

</section>

  <section class="city-event-section">

  <div class="section-head">

    <div>
      <small>Events</small>
      <h2>近期活動</h2>
    </div>

    <div class="event-controls">
      <button id="eventPrevBtn" type="button">←</button>
      <button id="eventNextBtn" type="button">→</button>
    </div>

  </div>

  <div class="event-carousel" id="eventCarousel"></div>

</section>

  <!-- Footer -->
  <div id="footer"></div>

</main>

  <section class="spot-sheet" id="spotSheet">
  <div class="spot-sheet-backdrop" id="spotSheetBackdrop"></div>

  <div class="spot-sheet-panel">
    <div class="spot-sheet-head">
      <div>
        <small>City Spots</small>
        <h2>全部景點</h2>
      </div>

      <button id="spotSheetClose" type="button">×</button>
    </div>

    <div class="spot-sheet-grid" id="spotSheetGrid"></div>
  </div>
</section>

  <section class="food-sheet" id="foodSheet">
  <div class="food-sheet-backdrop" id="foodSheetBackdrop"></div>

  <div class="food-sheet-panel">
    <div class="food-sheet-head">
      <div>
        <small>City Food</small>
        <h2>全部美食</h2>
      </div>

      <button id="foodSheetClose" type="button">×</button>
    </div>

    <div class="food-sheet-grid" id="foodSheetGrid"></div>
  </div>
</section>

  <!-- Mobile Menu -->
<div class="mobile-menu" id="mobileMenu">

  <div class="mobile-menu-panel">

    <div class="mobile-menu-head">

      <strong>HeriLand</strong>

      <button
        id="mobileMenuClose"
        type="button"
      >
        ×
      </button>

    </div>

    <!-- 共用 Mobile Nav -->
    <div id="mobileNav"></div>

    <div class="mobile-menu-ai">

      <small>AI Guide</small>

      <p>
        我會依照你現在的位置、時間和狀態，
        幫你推薦現在適合探索的砂拉越城市。
      </p>

    </div>

  </div>

</div>

<script type="module" src="./js/pages/city.js"></script>
  <script type="module" src="./js/components.js"></script>
</body>
</html>

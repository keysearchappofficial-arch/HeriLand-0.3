<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HeriLand Cities</title>

  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/layout.css" />
  <link rel="stylesheet" href="./css/pages/city.css" />
  <link rel="stylesheet" href="./css/mobile.css" />
</head>

<body>

<main class="city-page">

  <!-- Desktop / Page Top Nav -->
  <div id="navbar"></div>

  <!-- City Top -->
  <section class="city-top">
    <div class="city-top-head">
      <h1>Explore Sarawak</h1>
      <p>選擇一個城市開始探索</p>
    </div>

    <div class="city-tabs" id="cityTabs"></div>
  </section>

  <!-- Current City Hero -->
  <section class="city-hero">
    <img id="cityHeroImage" src="" alt="">

    <div class="city-hero-content">
      <small>HeriLand City Guide</small>
      <h2 id="cityHeroTitle">Kuching</h2>
      <p id="cityHeroDesc">
        從城市散步、美食、景點和活動開始探索砂拉越。
      </p>
    </div>
  </section>

  <!-- AI City Hint -->
  <section class="city-ai-note">
    <div>
      <small>AI Guide</small>
      <p id="cityAiText">
        第一次來 Kuching？建議先從河邊、老街和在地美食開始。
      </p>
    </div>
  </section>

  <!-- City Sections Placeholder -->
  <section class="city-content-grid">

    <article class="city-content-card">
      <h3>景點推薦</h3>
      <p id="citySpotText">適合先從 Waterfront 和城市散步路線開始。</p>
      <button>查看景點</button>
    </article>

    <article class="city-content-card">
      <h3>美食推薦</h3>
      <p id="cityFoodText">找一間在地 Laksa 或 Kolo Mee，先吃一頓穩的。</p>
      <button>查看美食</button>
    </article>

    <article class="city-content-card">
      <h3>近期活動</h3>
      <p id="cityEventText">看看這個城市最近有什麼市集、展覽或夜間活動。</p>
      <button>查看活動</button>
    </article>

  </section>

  <!-- Footer -->
  <div id="footer"></div>

</main>

<!-- Mobile Bottom Nav -->
<div id="mobileNav"></div>

<script type="module" src="./js/pages/city.js"></script>
  <script type="module" src="./js/components.js"></script>
</body>
</html>
